<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Canopy, Sign & Construction - Survey Portal</title>

        /* ==========================================================================
           EMPIRE CORPORATE DESIGN SYSTEM (High-Fidelity Match to image_da5d3a.png)
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --empire-red: #ff0000;       /* Vibrant corporate red */
            --empire-blue: #0f398a;      /* Clean deep brand blue */
            --empire-dark: #000000;      /* Sharp black typography */
            --bg-light: #f1f5f9;         /* Field-scannable slate background */
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            -webkit-text-size-adjust: 100%;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* High-Fidelity Header Layout */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 4px solid var(--empire-blue);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .logo-graphic-container {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        /* Pixel-perfect vector match of the exact image geometry */
        .logo-svg {
            width: 75px;
            height: 65px;
        }

        .logo-text-box {
            display: flex;
            flex-direction: column;
        }

        .logo-text-box h1 {
            font-size: 2.2em;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin: 0;
            line-height: 0.95;
            color: var(--empire-dark);
            font-family: 'Inter', sans-serif;
        }

        .logo-subtext-pill {
            background-color: var(--empire-blue);
            color: #ffffff;
            font-size: 0.65em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 3px 8px;
            border-radius: 50px;
            margin-top: 6px;
            display: inline-block;
            text-align: center;
            width: fit-content;
        }

        /* Section Typography */
        .section-title {
            color: var(--empire-blue);
            font-size: 0.95em;
            font-weight: 800;
            margin: 28px 0 14px 0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

            width: 100%;
            padding: 11px 12px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
