<script>
    document.getElementById('form_date').valueAsDate = new Date();
    let siteImageBuffer = [];

    function postFeedbackMessage(text, nature) {
        const component = document.getElementById('status-alert');
        component.innerText = text;
        component.style.display = 'block';
        if (nature === 'success') {
            component.style.background = '#f0fdf4'; component.style.color = '#166534'; component.style.border = '1px solid #bbf7d0';
        } else if (nature === 'process') {
            component.style.background = '#eff6ff'; component.style.color = '#1e40af'; component.style.border = '1px solid #bfdbfe';
        } else {
            component.style.background = '#fef2f2'; component.style.color = '#991b1b'; component.style.border = '1px solid #fecaca';
        }
    }

    function optimizeAndBufferImages(e) {
        const assets = e.target.files;
        if (!assets.length) return;

        postFeedbackMessage("Processing images...", "process");

        const structuralCategory = document.getElementById('photoCategory').value;
        const directionalNotes = document.getElementById('photoNotes').value || "Survey field record.";
        let completePipelineTracker = 0;

        for (let idx = 0; idx < assets.length; idx++) {
            const fileRef = assets[idx];
            const pipelineReader = new FileReader();
            
            pipelineReader.readAsDataURL(fileRef);
            pipelineReader.onload = function(uploadEvent) {
                const targetImageElement = new Image();
                targetImageElement.src = uploadEvent.target.result;
                
                targetImageElement.onload = function() {
                    const canvasMatrix = document.createElement('canvas');
                    const dimensionalBoundary = 1000;
                    let structuralWidth = targetImageElement.width;
                    let structuralHeight = targetImageElement.height;

                    if (structuralWidth > structuralHeight) {
                        if (structuralWidth > dimensionalBoundary) { 
                            structuralHeight = Math.round((structuralHeight * dimensionalBoundary) / structuralWidth); 
                            structuralWidth = dimensionalBoundary; 
                        }
                    } else {
                        if (structuralHeight > dimensionalBoundary) { 
                            structuralWidth = Math.round((structuralWidth * dimensionalBoundary) / structuralHeight); 
                            structuralHeight = dimensionalBoundary; 
                        }
                    }

                    canvasMatrix.width = structuralWidth; 
                    canvasMatrix.height = structuralHeight;
                    const context2D = canvasMatrix.getContext('2d');
                    context2D.drawImage(targetImageElement, 0, 0, structuralWidth, structuralHeight);
                    
                    const optimizedBase64Stream = canvasMatrix.toDataURL('image/jpeg', 0.78);

                    siteImageBuffer.push({
                        idKey: Date.now() + Math.random().toString(36).substr(2, 5),
                        categoryLabel: structuralCategory,
                        notesLabel: directionalNotes,
                        dataStream: optimizedBase64Stream
                    });

                    completePipelineTracker++;
                    if (completePipelineTracker === assets.length) {
                        postFeedbackMessage(`Added ${assets.length} images.`, "success");
                        refreshVisualGallery();
                        document.getElementById('photoNotes').value = "";
                        document.getElementById('fileSelector').value = "";
                    }
                };
            };
        }
    }

    function removeTargetAsset(targetUID) {
        siteImageBuffer = siteImageBuffer.filter(element => element.idKey !== targetUID);
        refreshVisualGallery();
    }

    function refreshVisualGallery() {
        const domTarget = document.getElementById('previewGallery');
        domTarget.innerHTML = "";
        siteImageBuffer.forEach(assetItem => {
            const nodeWrapper = document.createElement('div');
            nodeWrapper.className = "gallery-card";
            nodeWrapper.innerHTML = `
                <img src="${assetItem.dataStream}">
                <div class="gallery-details">
                    <span class="tag">${assetItem.categoryLabel}</span>
                    <button type="button" class="btn-delete" onclick="removeTargetAsset('${assetItem.idKey}')">Delete</button>
                </div>
            `;
            domTarget.appendChild(nodeWrapper);
        });
    }

    function compileAndTriggerPrintSystem() {
        const submissionControl = document.getElementById('submitBtn');
        submissionControl.disabled = true;

        try {
            const extractInputString = (elementID) => document.getElementById(elementID).value || "---";
            const extractCheckboxState = (elementID) => document.getElementById(elementID).checked ? "[ X ]" : "[   ]";
            const cleanWorkOrderHeader = extractInputString('form_wo').toUpperCase();

            let reportingHTMLPayload = `
                <div class="print-page">
                    <table class="p-table">
                        <tr>
                            <td colspan="4" rowspan="3" class="p-corporate-logo-cell">
                                <div class="p-corp-title">EMPIRE<span> CO.</span></div>
                                <div class="p-corp-sub">Field Engineering Survey Package</div>
                            </td>
                            <td class="p-label">SURVEY DATE</td>
                            <td class="p-label">SURVEYOR</td>
                        </tr>
                        <tr>
                            <td>${extractInputString('form_date')}</td>
                            <td style="font-weight:bold;">${extractInputString('form_surveyor').toUpperCase()}</td>
                        </tr>
                        <tr>
                            <td colspan="2" class="p-label">Physical Job Site Location</td>
                        </tr>
                        <tr>
                            <td class="p-label">WORK ORDER ID / NAME</td>
                            <td colspan="3" style="font-weight:bold; font-size:13px; color:#ff0000;">${cleanWorkOrderHeader}</td>
                            <td colspan="2" rowspan="2" style="vertical-align:top; font-weight:bold;">${extractInputString('form_address').toUpperCase()}</td>
                        </tr>
                        <tr>
                            <td colspan="4" style="height:6px;"></td>
                        </tr>
                        <tr>
                            <td class="p-label">Column Configuration</td>
                            <td colspan="5">
                                DIMENSIONS: <strong>${extractInputString('col_size')}</strong> | QTY: <strong>${extractInputString('col_qty')}</strong> | ROUND: <strong>${extractCheckboxState('col_round')}</strong> | SQUARE: <strong>${extractCheckboxState('col_square')}</strong>
                            </td>
                        </tr>
                        <tr>
                            <td class="p-label">Canopy/Store Bollards</td>
                            <td colspan="5">
                                CANOPY QTY: <strong>${extractInputString('cb_qty')}</strong> | STORE QTY: <strong>${extractInputString('sb_qty')}</strong>
                            </td>
                        </tr>
                        <tr>
                            <td class="p-label">Lighting / Vents</td>
                            <td colspan="5">
                                LIGHTS QTY: <strong>${extractInputString('lights_qty')}</strong> | VENTS QTY: <strong>${extractInputString('vent_qty')}</strong>
                            </td>
                        </tr>
                        <tr>
                            <td class="p-label">Field Notes</td>
                            <td colspan="5">${extractInputString('site_comments')}</td>
                        </tr>
                    </table>
            `;

            siteImageBuffer.forEach(item => {
                reportingHTMLPayload += `
                <div class="p-photo-block">
                    <div class="p-photo-header">
                        <span>${item.categoryLabel}</span>
                        <span>${item.notesLabel}</span>
                    </div>
                    <img src="${item.dataStream}">
                </div>`;
            });

            reportingHTMLPayload += `</div>`;

            document.getElementById('print-view').innerHTML = reportingHTMLPayload;
            window.print();
            submissionControl.disabled = false;
        } catch (err) {
            alert("Error compiling report: " + err.message);
            submissionControl.disabled = false;
        }
    }
</script>
