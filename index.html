<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Canopy, Sign & Construction - Survey Portal</title>
    <style>
        /* ==========================================================================
           EMPIRE CORPORATE DESIGN SYSTEM
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --empire-red: #ff0000;       
            --empire-blue: #0f398a;      
            --empire-dark: #000000;      
            --bg-light: #f1f5f9;         
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            -webkit-text-size-adjust: 100%;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Header Layout */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 4px solid var(--empire-blue);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .logo-svg {
            width: 100%;
            max-width: 160px;
            height: auto;
        }

        .logo-text-box {
            display: flex;
            flex-direction: column;
        }

        .logo-text-box h1 {
            font-size: 1.8em;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            color: var(--empire-dark);
        }

        .logo-subtext-pill {
            background-color: var(--empire-blue);
            color: #ffffff;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 50px;
            margin-top: 6px;
            display: inline-block;
            width: fit-content;
        }

        /* Layout & Inputs */
        .section-title {
            color: var(--empire-blue);
            font-size: 0.95em;
            font-weight: 800;
            margin: 28px 0 14px 0;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        .input-group { display: flex; flex-direction: column; }
        
        /* Mobile adjustment for full-width inputs */
        @media (max-width: 600px) {
            .grid-row { grid-template-columns: 1fr; }
            .input-group { grid-column: span 1 !important; }
        }

        label {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px 12px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px; /* Prevents iOS auto-zoom */
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--empire-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 57, 138, 0.15);
        }

        /* Checkboxes */
        .checkbox-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85em;
            font-weight: 600;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            flex-grow: 1;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--empire-blue);
        }

        .inline-qty { width: 65px; text-align: center; margin-left: auto;}

        /* Photo Upload & Gallery */
        .photo-box {
            background: #f8fafc;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }

        .file-trigger {
            background: var(--empire-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .live-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .gallery-card {
            background: white;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .gallery-card img { width: 100%; height: 100px; object-fit: cover; display: block; }
        .gallery-details { padding: 6px; }
        .tag { background: rgba(15, 57, 138, 0.08); color: var(--empire-blue); padding: 2px 4px; border-radius: 4px; font-weight: 700; font-size: 0.7em; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        /* Buttons & Alerts */
        .btn-submit { 
            background: var(--empire-red); color: white; padding: 16px; border: none; border-radius: 6px; font-weight: 800; font-size: 1.05em; width: 100%; margin-top: 24px; cursor: pointer; text-transform: uppercase;
        }
        .btn-delete { background: #fff5f5; color: var(--empire-red); padding: 5px; font-size: 0.75em; font-weight: 700; border-radius: 4px; border: 1px solid #fed7d7; width: 100%; margin-top: 6px; cursor: pointer; }
        
        #status-alert { display: none; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-weight: 700; font-size: 0.85em; text-align: center; }

        /* ==========================================================================
           PRINT ENGINE (Hides Web Form, Shows Professional PDF Report)
           ========================================================================== */
        @media print {
            /* 1. Hide the Web App */
            body > *:not(#print-view) { display: none !important; }
            
            /* 2. Reveal Print Container */
            #print-view { display: block !important; width: 100%; color: black; font-family: Arial, sans-serif; }
            
            /* 3. Table Formatting */
            .p-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; page-break-inside: avoid; border: 2px solid #000; }
            .p-table td { border: 1px solid #000; padding: 8px; font-size: 12px; vertical-align: top; }
            .p-label { background: #f1f5f9 !important; font-weight: bold; width: 25%; text-transform: uppercase; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            /* Header inside Print */
            .p-header-cell { background: #000 !important; color: #fff !important; padding: 15px !important; text-align: center; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-header-cell h2 { margin: 0; font-family: 'Arial Black', sans-serif; letter-spacing: 1px; }
            .p-header-cell span { color: red; }
            
            /* 4. Photo Pagination (Forces New Page for each Category) */
            .category-section { page-break-before: always; padding-top: 15px; }
            .category-title { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 15px; font-size: 16px; font-weight: bold; text-transform: uppercase;}
            .photo-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; }
            .p-photo-card { width: 48%; page-break-inside: avoid; margin-bottom: 15px; }
            .p-photo-card img { width: 100%; max-height: 400px; object-fit: contain; border: 1px solid #000; }
            .p-photo-card p { font-size: 11px; font-weight: bold; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <div class="card">
        <div class="brand-header">
            <img src="empire - logo.png" alt="Empire Logo" class="logo-svg" onerror="this.style.display='none'">
            <div class="logo-text-box">
                <h1>Empire Canopy Sign &amp; Construction</h1>
                <div class="logo-subtext-pill">Field Survey Form</div>
            </div>
        </div>

        <div id="status-alert"></div>

        <div class="section-title">Project Identification</div>
        <div class="grid-row">
            <div class="input-group">
                <label>Work Order # / Facility Name</label>
                <input type="text" id="form_wo" placeholder="e.g. GET N GO">
            </div>
            <div class="input-group">
                <label>Survey Date</label>
                <input type="date" id="form_date">
            </div>
            <div class="input-group">
                <label>Assigned Surveyor</label>
                <input type="text" id="form_surveyor" placeholder="Your Name">
            </div>
        </div>
        <div class="grid-row">
            <div class="input-group" style="grid-column: span 3 / span 3;">
                <label>Job Site Physical Address</label>
                <input type="text" id="form_address" placeholder="Full Location Street Address">
            </div>
        </div>

        <div class="section-title">SITE DETAILS</div>
        
        <div class="grid-row">
            <div class="input-group">
                <label>Columns Size Dimensions</label>
                <input type="text" id="col_size" placeholder="e.g. 12x12">
            </div>
            <div class="input-group">
                <label>Columns Quantity</label>
                <input type="number" id="col_qty" placeholder="Total Count" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Column Base Profiles</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="col_round"> Round</label>
                    <label class="checkbox-item"><input type="checkbox" id="col_square"> Square</label>
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Canopy Bollards Profile</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="cb_horseshoe"> Horseshoe</label>
                    <label class="checkbox-item"><input type="checkbox" id="cb_straight"> Straight</label>
                </div>
            </div>
            <div class="input-group">
                <label>Canopy Bollards Quantity</label>
                <input type="number" id="cb_qty" class="bollard-field" placeholder="Count" inputmode="numeric">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Store Bollards Profile</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="sb_horseshoe"> Horseshoe</label>
                    <label class="checkbox-item"><input type="checkbox" id="sb_straight"> Straight</label>
                </div>
            </div>
            <div class="input-group">
                <label>Store Bollards Quantity</label>
                <input type="number" id="sb_qty" class="bollard-field" placeholder="Count" inputmode="numeric">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Other Bollards Profile</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="ob_horseshoe"> Horseshoe</label>
                    <label class="checkbox-item"><input type="checkbox" id="ob_straight"> Straight</label>
                </div>
            </div>
            <div class="input-group">
                <label>Other Bollards Quantity</label>
                <input type="number" id="ob_qty" class="bollard-field" placeholder="Count" inputmode="numeric">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group" style="grid-column: span 3 / span 3;">
                <div style="background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px dashed var(--empire-blue); font-size: 0.85em; font-weight: bold; color: var(--empire-blue); text-align: center;">
                    📊 Total Bollard Covers Required = <span id="total_bollards_badge">0</span>
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Overall Canopy Dimensions</label>
                <input type="text" id="canopy_size" placeholder="e.g. 24' x 120'">
            </div>
            <div class="input-group">
                <label>Canopy Fascia Face Height</label>
                <input type="text" id="fascia_height" placeholder="e.g. 30 inches">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group" style="grid-column: span 3 / span 3;">
                <label>Canopy Deck Surface Condition</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="deck_good"> Clean / Good</label>
                    <label class="checkbox-item"><input type="checkbox" id="deck_paint"> Needs Painting</label>
                    <label class="checkbox-item"><input type="checkbox" id="deck_rusted"> Oxidation / Rust</label>
                    <label class="checkbox-item"><input type="checkbox" id="deck_washed"> Requires Wash</label>
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Pump Islands Quantity</label>
                <input type="number" id="pump_islands_qty" placeholder="Total Islands" inputmode="numeric">
            </div>
            <div class="input-group" style="grid-column: span 2 / span 2;">
                <label>Dispenser Product Configurations</label>
                <div class="checkbox-row">
                    <span class="checkbox-item" style="flex-wrap: wrap;">
                        <input type="checkbox" id="pump_31"> 3+1 Blended
                        <input type="number" id="pump_31_qty" class="inline-qty" placeholder="Qty" inputmode="numeric">
                    </span>
                    <span class="checkbox-item" style="flex-wrap: wrap;">
                        <input type="checkbox" id="pump_30"> 3+0 Standard
                        <input type="number" id="pump_30_qty" class="inline-qty" placeholder="Qty" inputmode="numeric">
                    </span>
                </div>
            </div>
        </div>
        <div class="grid-row">
            <div class="input-group" style="grid-column: span 3 / span 3;">
                <label>Alternative Dispenser Profiles / Engineering Notes</label>
                <input type="text" id="pump_other" placeholder="Document specific model variations or setups">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Illumination Light Poles Qty</label>
                <input type="number" id="poles_qty" placeholder="Count" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Light Poles Factory Color</label>
                <input type="text" id="poles_color" placeholder="e.g. Bronze / Black">
            </div>
        </div>
        <div class="grid-row">
            <div class="input-group">
                <label>Vent Stacks / Pipes Qty</label>
                <input type="number" id="vent_qty" placeholder="Count" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Vent Stacks Paint Color</label>
                <input type="text" id="vent_color" placeholder="e.g. Silver">
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group">
                <label>Under-Canopy Lighting Fixtures Qty</label>
                <input type="number" id="lights_qty" placeholder="Total Fixtures" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Luminaire Technology Array</label>
                <div class="checkbox-row">
                    <label class="checkbox-item"><input type="checkbox" id="lights_led"> Solid-State LED</label>
                    <label class="checkbox-item"><input type="checkbox" id="lights_nonled"> Traditional HID</label>
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="input-group" style="grid-
