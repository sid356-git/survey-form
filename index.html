<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Survey Portal</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; }
        .brand-header { display: flex; align-items: center; gap: 16px; border-bottom: 4px solid #0f398a; padding-bottom: 16px; }
        .logo-svg { width: 75px; height: 65px; }
        .form-group { margin-top: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; }
        .btn { background: #0f398a; color: white; padding: 15px; border: none; width: 100%; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand-header">
        <svg class="logo-svg" viewBox="0 0 140 120" xmlns="http://www.w3.org/2000/svg">
            <path d="M 10,105 A 60,60 0 0,1 130,105 L 108,105 A 38,38 0 0,0 32,105 Z" fill="#ff0000"/>
            <path d="M 43,105 L 67,105 L 67,36 L 43,47 Z" fill="#0f398a"/>
            <path d="M 73,105 L 97,105 L 97,47 L 73,36 Z" fill="#0f398a"/>
        </svg>
        <h1>Empire Survey Portal</h1>
    </div>

    <div class="form-group">
        <label>Surveyor Name</label>
        <input type="text" placeholder="e.g., John Doe">
        
        <label>Site Address</label>
        <input type="text" placeholder="e.g., Dallas, TX">
        
        <label>Field Notes</label>
        <textarea rows="4" placeholder="Enter observations..."></textarea>
        
        <button class="btn">Capture Photos</button>
        <br><br>
        <button class="btn" style="background:#ff0000;">Compile & Save PDF</button>
    </div>
</div>

</body>
</html>
