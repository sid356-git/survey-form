<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Survey Form - Get 'N Go</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- pdf-lib for processing PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 sm:p-6">

    <div class="max-w-3xl mx-auto bg-gray-800 rounded-xl shadow-2xl border border-gray-700 p-6">
        <!-- Header -->
        <div class="border-b border-gray-700 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-amber-500">EMPIRE SIGNAGE & CANOPY</h1>
            <p class="text-gray-400 text-sm mt-1">Field Survey Tool — Get 'N Go Layout</p>
        </div>

        <!-- Form Fields -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Surveyor Name</label>
                <input type="text" id="surveyor_name" placeholder="e.g., John Doe" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Site Address / Location</label>
                <input type="text" id="site_address" placeholder="e.g., Dallas, TX" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Field Notes / Comments</label>
                <textarea id="field_notes" rows="3" placeholder="Enter any specific site constraints or observations..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-amber-500"></textarea>
            </div>

            <!-- Image Upload Section -->
            <div class="bg-gray-750 p-4 border border-dashed border-gray-600 rounded-lg text-center">
                <label class="cursor-pointer block">
                    <span class="bg-amber-600 hover:bg-amber-500 text-white font-semibold px-4 py-2 rounded-lg inline-block mb-2 shadow-md transition-all">
                        📸 Capture or Select Photos
                    </span>
                    <input type="file" id="photo_input" accept="image/*" multiple capture="environment" class="hidden">
                    <p class="text-xs text-gray-400">Supports live camera capture and photo library selection</p>
                </label>
            </div>

            <!-- Visual Feedback List -->
            <div>
                <h3 class="text-sm font-semibold text-gray-400 mb-2">Attached Images Queue:</h3>
                <div id="attachments_list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                    <p id="no_photos_msg" class="text-sm text-gray-500 italic">No photos attached yet.</p>
                </div>
            </div>

            <!-- Submit Button -->
            <button id="compile_btn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.99] text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all mt-6 flex items-center justify-center gap-2">
                💾 Compile & Save Final PDF
            </button>
        </div>
    </div>

    <script>
        // Store images globally as compressed base64 strings
        let photoStore = [];

        const photoInput = document.getElementById('photo_input');
        const attachmentsList = document.getElementById('attachments_list');
        const noPhotosMsg = document.getElementById('no_photos_msg');
        const compileBtn = document.getElementById('compile_btn');

        // Handle Image Selection and Mobile Compression
        photoInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            if (noPhotosMsg) noPhotosMsg.remove();

            for (const file of files) {
                try {
                    const compressedBase64 = await compressImage(file, 800, 800, 0.7);
                    
                    // Add to local array tracking
                    photoStore.push(compressedBase64);

                    // Add visual item to list
                    const item = document.createElement('div');
                    item.className = "flex items-center justify-between bg-gray-700 p-2 rounded-lg border border-gray-600 text-sm animate-fade-in";
                    item.innerHTML = `
                        <div class="flex items-center gap-2 truncate">
                            <img src="${compressedBase64}" class="w-10 h-10 object-cover rounded border border-gray-500">
                            <span class="truncate text-gray-200">${file.name || 'Captured Image'}</span>
                        </div>
                        <button class="text-red-400 hover:text-red-300 font-bold px-2 py-1 transition-colors" onclick="removePhoto(this, '${compressedBase64}')">Remove</button>
                    `;
                    attachmentsList.appendChild(item);
                } catch (error) {
                    alert("Error processing image: " + error.message);
                }
            }
            // Clear input reset value so the same image can be re-snapped if needed
            photoInput.value = '';
        });

        // Image compressor function to bypass mobile RAM limitations
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Convert to compressed jpeg format
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataUrl);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        // Global function to handle image removal
        window.removePhoto = function(buttonElement, targetBase64) {
            photoStore = photoStore.filter(img => img !== targetBase64);
            buttonElement.parentElement.remove();
            if (photoStore.length === 0) {
                attachmentsList.appendChild(noPhotosMsg);
            }
        };

        // Compile Form and Generate PDF (Mobile Compatible Download Method)
        compileBtn.addEventListener('click', async () => {
            const name = document.getElementById('surveyor_name').value || 'N/A';
            const address = document.getElementById('site_address').value || 'N/A';
            const notes = document.getElementById('field_notes').value || 'N/A';

            try {
                compileBtn.disabled = true;
                compileBtn.innerText = "Processing PDF...";

                // Create document
                const pdfDoc = await PDFLib.PDFDocument.create();
                let page = pdfDoc.addPage([612, 792]); // Standard Letter Size
                const { width, height } = page.getSize();

                // Draw Text Titles
                page.drawText("EMPIRE SIGNAGE & CANOPY FIELD REPORT", { x: 50, y: height - 50, size: 20, color: PDFLib.rgb(0.8, 0.5, 0.1) });
                page.drawText(`Surveyor: ${name}`, { x: 50, y: height - 90, size: 12 });
                page.drawText(`Date: ${new Date().toLocaleDateString()}`, { x: 50, y: height - 110, size: 12 });
                page.drawText(`Location: ${address}`, { x: 50, y: height - 130, size: 12 });
                
                page.drawText("Field Observations & Comments:", { x: 50, y: height - 170, size: 14, color: PDFLib.rgb(0.2, 0.2, 0.2) });
                page.drawText(notes, { x: 50, y: height - 190, size: 11, maxWidth: 512, lineHeight: 14 });

                // Append Photos seamlessly
                let currentY = height - 260;
                for (let i = 0; i < photoStore.length; i++) {
                    const base64Data = photoStore[i].split(',')[1];
                    const imageBytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                    const embeddedImage = await pdfDoc.embedJpg(imageBytes);

                    // Check if image fits page bounds, if not roll onto a new page
                    if (currentY - 220 < 40) {
                        page = pdfDoc.addPage([612, 792]);
                        currentY = 740;
                    }

                    page.drawText(`Attachment Photo #${i + 1}:`, { x: 50, y: currentY, size: 11 });
                    page.drawImage(embeddedImage, {
                        x: 50,
                        y: currentY - 210,
                        width: 280,
                        height: 200
                    });
                    currentY -= 240;
                }

                // Compile binary representation
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });

                // Mobile Native Safe Download Trigger
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Empire_SurveyForm_GetNGo_${Date.now()}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                alert("Success! PDF generated and downloaded successfully.");

            } catch (err) {
                alert("Generation error details: " + err.message);
            } finally {
                compileBtn.disabled = false;
                compileBtn.innerText = "💾 Compile & Save Final PDF";
            }
        });
    </script>
</body>
</html>
